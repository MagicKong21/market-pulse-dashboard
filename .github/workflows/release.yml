name: Version and release

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: market-pulse-release
  cancel-in-progress: false

env:
  NODE_VERSION: 24.18.0

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      commit_sha: ${{ steps.version.outputs.commit_sha }}
    steps:
      - name: Check out main with tags
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Node.js LTS
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Increment patch version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          series=$(node -p 'const v=require("./package.json").version.split("."); `${v[0]}.${v[1]}`')
          latest_tag=$(git tag --list "v${series}.*" --sort=-v:refname | head -n 1)
          version=$(node scripts/bump-version.mjs "$latest_tag")
          tag="v${version}"

          node --test

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json public/version.js
          if ! git diff --cached --quiet; then
            git commit -m "chore: bump version to ${tag}"
            git push origin HEAD:main
          fi

          if ! git rev-parse "refs/tags/${tag}" >/dev/null 2>&1; then
            git tag -a "$tag" -m "Release $tag"
            git push origin "$tag"
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "commit_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  package:
    needs: version
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: macos-arm64
            archive: node-v24.18.0-darwin-arm64.tar.gz
            node_dir: node-v24.18.0-darwin-arm64
            executable: bin/node
            output: stock-dashboard-macos-arm64.zip
          - target: macos-x64
            archive: node-v24.18.0-darwin-x64.tar.gz
            node_dir: node-v24.18.0-darwin-x64
            executable: bin/node
            output: stock-dashboard-macos-x64.zip
          - target: windows-x64
            archive: node-v24.18.0-win-x64.zip
            node_dir: node-v24.18.0-win-x64
            executable: node.exe
            output: stock-dashboard-windows-x64.zip

    steps:
      - name: Check out release source
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.version.outputs.commit_sha }}

      - name: Download and verify Node.js LTS
        shell: bash
        run: |
          set -euo pipefail
          base="https://nodejs.org/dist/v${NODE_VERSION}"
          curl --fail --location --retry 3 --output "${{ matrix.archive }}" "$base/${{ matrix.archive }}"
          curl --fail --location --retry 3 --output SHASUMS256.txt "$base/SHASUMS256.txt"
          grep "  ${{ matrix.archive }}$" SHASUMS256.txt | sha256sum --check --strict

      - name: Assemble package
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p package/runtime
          cp -R public package/
          cp server.mjs market.mjs package.json README.md LICENSE THIRD_PARTY_NOTICES.md package/

          if [[ "${{ matrix.archive }}" == *.zip ]]; then
            unzip -q "${{ matrix.archive }}"
          else
            tar -xzf "${{ matrix.archive }}"
          fi

          cp "${{ matrix.node_dir }}/LICENSE" package/runtime/NODE_LICENSE.txt

          if [[ "${{ matrix.target }}" == windows-* ]]; then
            mkdir -p package/scripts
            cp "${{ matrix.node_dir }}/${{ matrix.executable }}" package/runtime/node.exe
            cp "【Windows】启动看板.bat" package/
            cp scripts/start-windows.ps1 package/scripts/
          else
            cp "${{ matrix.node_dir }}/${{ matrix.executable }}" package/runtime/node
            cp "【Mac】启动看板.command" package/
            chmod +x package/runtime/node "package/【Mac】启动看板.command"
          fi

          (cd package && zip -qry "../${{ matrix.output }}" .)

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: ${{ matrix.output }}
          if-no-files-found: error

  release:
    needs:
      - version
      - package
    runs-on: ubuntu-latest
    steps:
      - name: Download all packages
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: v${{ needs.version.outputs.version }}
        shell: bash
        run: |
          if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" dist/*.zip --clobber --repo "$GITHUB_REPOSITORY"
          else
            gh release create "$RELEASE_TAG" dist/*.zip \
              --repo "$GITHUB_REPOSITORY" \
              --title "$RELEASE_TAG" \
              --generate-notes
          fi
